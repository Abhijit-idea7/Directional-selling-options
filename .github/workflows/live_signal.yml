name: Live Signal (2-min bars, 5-min GHA poll)

# ── How paper trading works ────────────────────────────────────────────────────
# Each run (every 5 min during market hours):
#   1. fetch_data.py  → pulls today's real Nifty 2-min bars
#                       source: yfinance (free, no credentials needed) OR
#                               broker API (if BROKER_ACCESS_TOKEN is set)
#   2. strategy.py    → computes 10 factors + composite score on real data
#                       outputs results/current_signal.json
#   3. executor.py    → compares new signal to last position (in state/)
#                       places paper or live order if signal changed
#
# For PAPER TRADE (default): no orders are placed, but Telegram alerts fire
# and state/position.json tracks the simulated position.
#
# GitHub Actions minimum cron = 5 min. Signals use 2-min bar data so each
# 5-min run processes 2–3 new bars and acts on the most recent one.
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Every 5 min, Mon–Fri, 03:45–09:45 UTC (= 09:15–15:15 IST)
    - cron: "45,50,55 3 * * 1-5"
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 4 * * 1-5"
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 5 * * 1-5"
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 6 * * 1-5"
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 7 * * 1-5"
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 8 * * 1-5"
    - cron: "0,5,10,15,20,25,30,35,40 9 * * 1-5"

  workflow_dispatch:
    inputs:
      paper_trade:
        description: "Paper trade? (true = no real orders)"
        default: "true"
        required: false

concurrency:
  group: live-signal
  cancel-in-progress: true

jobs:
  signal:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Guard: skip outside market hours ───────────────────────────────
      - name: Check market hours (IST)
        id: market_check
        run: |
          HOUR_IST=$(TZ="Asia/Kolkata" date +%H)
          MIN_IST=$(TZ="Asia/Kolkata" date +%M)
          TIME_INT=$((HOUR_IST * 100 + MIN_IST))
          echo "IST time: ${HOUR_IST}:${MIN_IST}"
          if [ "$TIME_INT" -lt 930 ] || [ "$TIME_INT" -gt 1515 ]; then
            echo "skip=true"  >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if outside market hours
        if: steps.market_check.outputs.skip == 'true'
        run: echo "Outside market hours — skipping." && exit 0

      # ── 2. Setup ──────────────────────────────────────────────────────────
      - name: Checkout
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        if: steps.market_check.outputs.skip != 'true'
        run: pip install -r requirements.txt

      # ── 3. Restore position state from last run ───────────────────────────
      - name: Restore position state
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: state/
          key: position-state-${{ github.run_id }}
          restore-keys: |
            position-state-

      # ── 4. Fetch real Nifty 2-min data ────────────────────────────────────
      # No broker credentials? yfinance (free) is used automatically.
      # Broker credentials set? Zerodha/Upstox API used for richer volume data.
      - name: Fetch market data
        if: steps.market_check.outputs.skip != 'true'
        env:
          BROKER_API_KEY:      ${{ secrets.BROKER_API_KEY }}
          BROKER_ACCESS_TOKEN: ${{ secrets.BROKER_ACCESS_TOKEN }}
          BROKER_TYPE:         ${{ secrets.BROKER_TYPE }}
        run: |
          mkdir -p data results state
          python fetch_data.py --bar-minutes 2 --output data/today_2min.csv
          echo "--- data preview ---"
          head -5 data/today_2min.csv

      # ── 5. Compute composite signal on real data ──────────────────────────
      - name: Generate signal
        if: steps.market_check.outputs.skip != 'true'
        run: |
          python multi_factor_nifty_strategy.py \
            --mode signal \
            --bar-minutes 2 \
            --data-csv data/today_2min.csv \
            --output-dir results
          echo "--- signal ---"
          cat results/current_signal.json

      # ── 6. Execute paper / live order if signal changed ───────────────────
      - name: Execute signal
        if: steps.market_check.outputs.skip != 'true'
        env:
          BROKER_API_KEY:      ${{ secrets.BROKER_API_KEY }}
          BROKER_ACCESS_TOKEN: ${{ secrets.BROKER_ACCESS_TOKEN }}
          BROKER_TYPE:         ${{ secrets.BROKER_TYPE }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          PAPER_TRADE:         ${{ github.event.inputs.paper_trade || 'true' }}
          STRIKE_STEP:         "50"
          LOT_SIZE:            "25"
          LOTS:                "1"
          STOP_LOSS_PCT:       "0.008"
        run: |
          python signal_executor.py --state-dir state --signal-dir results

      # ── 7. Persist state for next run ─────────────────────────────────────
      - name: Save position state
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/cache/save@v4
        with:
          path: state/
          key: position-state-${{ github.run_id }}

      # ── 8. Upload signal snapshot as artifact ─────────────────────────────
      - name: Upload signal snapshot
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: signal-${{ github.run_number }}
          path: |
            results/current_signal.json
            state/position.json
          retention-days: 7
