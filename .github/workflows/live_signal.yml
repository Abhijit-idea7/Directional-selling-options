name: Live Signal (2-min bars, 5-min GHA poll)

# ── Bar interval vs poll interval ──────────────────────────────────────────────
# Strategy uses 2-minute OHLCV bars for faster, more dynamic signals.
# GitHub Actions minimum cron granularity is 5 minutes (platform limit).
#
# Resolution:
#   Each workflow run fetches ALL 2-min bars generated since the last run
#   (typically 2–3 bars). Signals are computed on each bar; the most recent
#   one drives the order decision. This means signals react to 2-min price
#   action even though the GHA trigger fires every 5 min.
#
# For TRUE 2-min execution (signal checked exactly at every bar close):
#   Run live_trading_adapter.py as a continuous process on a VPS/server.
#   The adapter's built-in _sleep_to_next_bar(2) handles precise bar timing.
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Every 5 min, Mon–Fri, 03:45–09:45 UTC (= 09:15–15:15 IST)
    - cron: "45,50,55 3 * * 1-5"
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 4 * * 1-5"
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 5 * * 1-5"
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 6 * * 1-5"
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 7 * * 1-5"
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 8 * * 1-5"
    - cron: "0,5,10,15,20,25,30,35,40 9 * * 1-5"

  workflow_dispatch:
    inputs:
      paper_trade:
        description: "Paper trade (true/false)"
        default: "true"
        required: false

concurrency:
  group: live-signal
  cancel-in-progress: true   # prevent overlapping runs if GHA drifts

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - name: Check market hours (IST)
        id: market_check
        run: |
          HOUR_IST=$(TZ="Asia/Kolkata" date +%H)
          MIN_IST=$(TZ="Asia/Kolkata" date +%M)
          TIME_INT=$((HOUR_IST * 100 + MIN_IST))
          echo "IST time: ${HOUR_IST}:${MIN_IST} (${TIME_INT})"
          if [ "$TIME_INT" -lt 915 ] || [ "$TIME_INT" -gt 1515 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if outside market hours
        if: steps.market_check.outputs.skip == 'true'
        run: echo "Outside market hours — skipping." && exit 0

      - name: Checkout
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        if: steps.market_check.outputs.skip != 'true'
        run: pip install -r requirements.txt

      # ── Restore position state from previous run ──────────────────────────
      - name: Restore position state
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: state/
          key: position-state-${{ github.run_id }}
          restore-keys: |
            position-state-

      # ── Generate 2-min bar signal ─────────────────────────────────────────
      # Fetches last ~5 min of 2-min bars from broker, computes composite
      # score on each bar, outputs current_signal.json with the latest signal.
      - name: Generate signal
        if: steps.market_check.outputs.skip != 'true'
        env:
          BROKER_API_KEY:      ${{ secrets.BROKER_API_KEY }}
          BROKER_ACCESS_TOKEN: ${{ secrets.BROKER_ACCESS_TOKEN }}
          BROKER_TYPE:         ${{ secrets.BROKER_TYPE }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          PAPER_TRADE:         ${{ github.event.inputs.paper_trade || 'true' }}
        run: |
          mkdir -p results state
          python multi_factor_nifty_strategy.py \
            --mode signal \
            --bar-minutes 2 \
            --output-dir results

      # ── Execute order if signal changed ───────────────────────────────────
      - name: Execute signal
        if: steps.market_check.outputs.skip != 'true'
        env:
          BROKER_API_KEY:      ${{ secrets.BROKER_API_KEY }}
          BROKER_ACCESS_TOKEN: ${{ secrets.BROKER_ACCESS_TOKEN }}
          BROKER_TYPE:         ${{ secrets.BROKER_TYPE }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          PAPER_TRADE:         ${{ github.event.inputs.paper_trade || 'true' }}
          STRIKE_STEP:         "50"
        run: |
          python signal_executor.py --state-dir state --signal-dir results

      # ── Save position state for next run ──────────────────────────────────
      - name: Save position state
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/cache/save@v4
        with:
          path: state/
          key: position-state-${{ github.run_id }}

      - name: Upload signal snapshot
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: signal-${{ github.run_number }}
          path: results/current_signal.json
          retention-days: 7
