name: Nifty 50 Stock Backtest

on:
  workflow_dispatch:
    inputs:
      data_source:
        description: "Data source: 'yfinance' (real, last 7 days) or 'synthetic' (faster)"
        default: "yfinance"
        required: true
        type: choice
        options:
          - yfinance
          - synthetic
      days:
        description: "Days of synthetic data (only used when data_source=synthetic)"
        default: "40"
      capital:
        description: "Capital per stock (₹)"
        default: "50000"
      entry_threshold:
        description: "Entry threshold (0.25 recommended)"
        default: "0.25"
      stop_pct:
        description: "Stop-loss % (e.g. 0.006 = 0.6%)"
        default: "0.006"
      symbols:
        description: "Comma-separated symbols to test (blank = all 50)"
        default: ""
  push:
    branches: [main]
    paths:
      - "nifty50_intraday_backtest.py"

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run Nifty 50 stock backtest
        run: |
          mkdir -p results_stocks

          # Build the command — only pass --synthetic if explicitly chosen
          CMD="python nifty50_intraday_backtest.py"

          if [ "${{ github.event.inputs.data_source || 'yfinance' }}" = "synthetic" ]; then
            CMD="$CMD --synthetic --days ${{ github.event.inputs.days || '40' }}"
          fi

          CMD="$CMD \
            --capital ${{ github.event.inputs.capital || '50000' }} \
            --entry-thr ${{ github.event.inputs.entry_threshold || '0.25' }} \
            --stop-pct ${{ github.event.inputs.stop_pct || '0.006' }} \
            --output-dir results_stocks"

          if [ -n "${{ github.event.inputs.symbols }}" ]; then
            CMD="$CMD --symbols ${{ github.event.inputs.symbols }}"
          fi

          echo "Running: $CMD"
          eval $CMD

      - uses: actions/upload-artifact@v4
        with:
          name: stock-backtest-${{ github.run_number }}
          path: results_stocks/
          retention-days: 30
